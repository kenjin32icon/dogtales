<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dog Tales Kennel - Expert dog training, breeding, and care services in Kenya">
    <title>Dog Tales Kennel | Where Dogs Become Family</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: rgb(221, 201, 189);
            --secondary-color: #8D6E63;
            --accent-color: #FFAB91;
            --light-bg: #FFF3E0;
            --dark-text: #3E2723;
            --nav-icon-border: #5D4037;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--dark-text);
            background-color: var(--light-bg);
        }

        .header {
            background: var(--primary-color);
            padding: 1rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .nav-container {
            max-width: 1500px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
        }

        .logo-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid white;
            transition: transform 0.3s ease;
        }

        .logo:hover .logo-img {
            transform: rotate(15deg);
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            backdrop-filter: blur(5px);
        }

        .nav-links li {
            position: relative;
            transition: transform 0.3s ease;
        }

        .nav-links a {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80px;
            text-align: center;
            padding: 0.5rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            font-weight: 500;
        }

        .nav-links a::before {
            content: '';
            display: block;
            width: 50px;
            height: 50px;
            background-image: url('https://i.pinimg.com/736x/b5/f9/25/b5f9251560ebffbd9297fb369dcd2f2a.jpg');
            background-size: cover;
            border-radius: 50%;
            border: 2px solid var(--nav-icon-border);
            margin-bottom: 0.5rem;
            transition: transform 0.3s ease;
        }

        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }

        .nav-links a:hover::before {
            transform: scale(1.1);
        }

        .hero {
            position: relative;
            height: 60vh;
            overflow: hidden;
            text-align: center;
            margin-top: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .hero img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
 transition: opacity 1s ease-in-out;
        }

        .hero img.active {
            opacity: 1;
        }

        .hero h1 {
            position: relative;
            z-index: 1;
            font-size: 4rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 0.5rem;
        }

        .hero h2 {
            position: relative;
            z-index: 1;
            font-size: 2rem;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .section {
            padding: 4rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            margin-bottom: 3rem;
            color: var(--secondary-color);
            font-size: 2.5rem;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 100px;
            height: 3px;
            background: var(--accent-color);
            margin: 1rem auto;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .service-card {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .service-card::before {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 171, 145, 0.1);
            transform: rotate(45deg);
            transition: all 0.5s ease;
            z-index: 0;
        }

        .service-card:hover::before {
            bottom: -30%;
            left: -30%;
        }

        .service-card:hover {
            transform: translateY(-5px);
        }

        .service-card h3 {
            color: var(--secondary-color);
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }

        .service-card ul {
            padding-left: 1.5rem;
            margin: 1rem 0;
            position: relative;
            z-index: 1;
        }

        .service-quote {
            font-style: italic;
            color: var(--primary-color);
            margin-top: 1rem;
            padding-left: 1rem;
            border-left: 3px solid var(--accent-color);
            position: relative;
            z-index: 1;
            font-weight: 600;
        }

        .why-us {
            background: var(--light-bg);
            padding: 3rem 2rem;
            margin: 2rem 0;
        }

        .why-us ul {
            max-width: 800px;
            margin: 0 auto;
            list-style: none;
        }

        .why-us li {
            padding: 1rem;
            margin: 1rem 0;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .why-us li:hover {
            transform: translateX(10px);
        }

        .contact-form {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .contact-form::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: url('https://i.pinimg.com/736x/b5/f9/25/b5f9251560ebffbd9297fb369dcd2f2a.jpg') repeat;
            opacity: 0.05;
            transform: rotate(30deg);
            z-index: 0;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 1;
        }

        input, textarea {
 width: 100%;
            padding: 0.8rem;
            border: 2px solid var(--primary-color);
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            transition: border-color 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        button {
            background: var(--secondary-color);
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        button:hover {
            background: var(--accent-color);
            transform: translateY(-2px);
        }

        footer {
            background: linear-gradient(to right, var(--secondary-color), var(--dark-text));
            color: white;
            padding: 3rem 2rem;
            text-align: center;
            margin-top: 4rem;
            display: grid;
            gap: 1rem;
        }

        @media (max-width: 768px) {
            .nav-links {
                gap: 0.5rem;
                padding: 0.25rem;
            }

            .nav-links a {
                width: 60px;
                font-size: 0.8rem;
            }

            .nav-links a::before {
                width: 40px;
                height: 40px;
            }

            .hero h1 {
                font-size: 2.5rem;
                margin-bottom: 0.5rem;
            }

            .hero h2 {
                font-size: 1.5rem;
            }

            .logo-img {
                width: 80px;
                height: 80px;
            }

            .section-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <script>
        const images = document.querySelectorAll('.hero img');
        let currentIndex = 0;

        function changeImage() {
            images[currentIndex].classList.remove('active');
            currentIndex = (currentIndex + 1) % images.length;
            images[currentIndex].classList.add('active');
        }

        setInterval(changeImage, 4000);

        // Smooth scroll for navigation
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>
</html>
